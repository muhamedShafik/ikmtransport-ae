<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Preview — Bold Line Art SVGs</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 48px 24px;
    }

    h1 {
      color: #ffffff;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .icons-row {
      display: flex;
      gap: 48px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .icon-box {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      padding: 16px;
      transition: background 0.25s ease, transform 0.25s ease;
      cursor: pointer;
    }

    .icon-box:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-4px);
    }

    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Invert to make black SVGs white on dark bg */
      filter: invert(1);
    }

    .icon-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Light background preview ── */
    .light-section {
      background: #f5f5f5;
      border-radius: 24px;
      padding: 40px 56px;
      display: flex;
      gap: 48px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .icon-box-light {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      background: #ffffff;
      padding: 16px;
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }

    .icon-box-light:hover {
      background: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transform: translateY(-4px);
    }

    .icon-box-light img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Black stroke on light bg — no filter needed */
    }

    .section-label {
      color: #888;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: -32px;
    }

    .section-label.dark { color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>

  <h1>Bold Line Art Icons · SVG Preview</h1>

  <!-- Dark theme preview -->
  <p class="section-label dark">Dark Theme</p>
  <div class="icons-row">
    <div class="icon-card">
      <div class="icon-box">
        <img src="icons/icon-whatsapp.svg" alt="WhatsApp icon" />
      </div>
      <span class="icon-label">WhatsApp</span>
    </div>
    <div class="icon-card">
      <div class="icon-box">
        <img src="icons/icon-phone.svg" alt="Phone icon" />
      </div>
      <span class="icon-label">Phone</span>
    </div>
    <div class="icon-card">
      <div class="icon-box">
        <img src="icons/icon-email.svg" alt="Email icon" />
      </div>
      <span class="icon-label">Email</span>
    </div>
  </div>

  <!-- Light theme preview -->
  <p class="section-label">Light Theme</p>
  <div class="light-section">
    <div class="icon-card">
      <div class="icon-box-light">
        <img src="icons/icon-whatsapp.svg" alt="WhatsApp icon" />
      </div>
      <span class="icon-label" style="color:#888">WhatsApp</span>
    </div>
    <div class="icon-card">
      <div class="icon-box-light">
        <img src="icons/icon-phone.svg" alt="Phone icon" />
      </div>
      <span class="icon-label" style="color:#888">Phone</span>
    </div>
    <div class="icon-card">
      <div class="icon-box-light">
        <img src="icons/icon-email.svg" alt="Email icon" />
      </div>
      <span class="icon-label" style="color:#888">Email</span>
    </div>
  </div>

</body>
</html>
